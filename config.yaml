# All tunables live here. Code reads from this file — no magic numbers in code.

# Valid leaderboard categories verified against the live API on 2026-07-02.
# ECONOMY, GEOPOLITICS, POP-CULTURE, SCIENCE, ELECTIONS, ENTERTAINMENT,
# BUSINESS, WORLD all return HTTP 400. The API accepts exactly these six
# (plus OVERALL, which we don't use for per-category discovery):
categories:
  - POLITICS
  - SPORTS
  - CRYPTO
  - FINANCE
  - CULTURE
  - TECH

lookback_months: 6

api:
  throttle_seconds: 0.15        # min gap between any two requests (~6 req/s)
  backoff_base_seconds: 2       # exponential backoff base on 429/5xx
  max_retries: 3
  timeout_seconds: 30

discovery:
  leaderboard_page_limit: 50    # API max per page
  leaderboard_max_offset: 1000  # API max offset
  max_candidates_per_category: 120  # cap vetting work per category (shared pool for all cohorts)
  vetting_trade_limit: 1500     # trades pulled per candidate for vetting stats (paginated; /trades caps 1000/page)
  min_markets: 20
  min_trades: 50
  max_pnl_concentration: 0.6    # top-2 markets < 60% of total |PnL| (proxy)
  mm_roundtrip_threshold: 0.6   # >60% of markets with same-day round trips = MM
  mm_roundtrip_window_seconds: 86400
  max_watchlist: 500            # cap on the cohort UNION (a wallet counts once)
  max_per_category: 100         # union-level per-category cap
  # Three selection cohorts, each picks its top-K of the shared vetted pool:
  #   A = raw month PnL (control, = old method)
  #   B = PnL per dollar of volume (leaderboard pnl / vol)
  #   C = stake-weighted entry edge (resolution payout - entry price) over resolved buys
  cohort_size: 250              # top-K selected per cohort before union caps
  cohort_c_min_resolved_buys: 10  # fewer resolved buys than this -> edge metric too noisy, excluded from C

ingest:
  page_size: 1000               # trades per /trades page (API silently caps at 1000)
  max_offset: 3000              # API rejects offsets beyond 3000 -> max 4000 trades/wallet
  gamma_batch_size: 20          # condition_ids per Gamma /markets request
  price_history_fidelity_minutes: 60
  price_history_chunk_days: 14  # CLOB 400s on intervals >~15d at fidelity 60

sweep:
  n_traders: [2, 3, 4, 5, 6, 7, 8]
  window_hours: [1, 3, 6, 12, 24, 48]
  size_floor_usd: [100, 250, 500, 1000, 2500]  # per-trader min trade size to count toward a signal
  exit_strategy: [hold_to_resolution, copy_exits]
  position_size: [20, 50, 100]       # bot position size in USD
  # wallet sets the sweep runs over; A/B/C = cohort tag, union = all selected
  cohorts: [A, B, C, union]

backtest:
  train_months: 4               # first 4 months = train, rest = validate
  entry_price_min: 0.05         # skip signals priced outside this band
  entry_price_max: 0.95
  entry_price_max_gap_seconds: 86400  # no price candle within this gap of signal time -> skip
  copy_exit_wallet_fraction: 0.5     # exit when >= this fraction of signal wallets...
  copy_exit_sold_fraction: 0.5       # ...have sold >= this fraction of their position
  # overfitting guard: a top cell is "robust" only if >= this fraction of its
  # grid neighbors (N+/-1, W one step, F one step) are also profitable in validate
  robust_neighbor_fraction: 0.75
  report_top_cells: 40          # grid rows shown per cohort in the report (full grid stays in the DB)

slippage:
  entry_cents_20: 1             # +1c entry haircut for $20 positions
  entry_cents_50: 2             # +2c for $50
  entry_cents_100: 3            # +3c for $100 (monotone extrapolation, unverified against real books)
  exit_cents: 1

paper:
  poll_interval_seconds: 20
  # per-wallet rotating poll (2026-07-05): the GLOBAL /trades feed silently
  # drops ~95% of watchlist trades during busy periods (500-trade page vs
  # platform-wide volume) — user-filtered /trades is complete and has correct
  # outcome_index. 50 wallets/cycle sweeps a 250-wallet watchlist every ~2 min.
  wallets_per_poll: 50
  poll_trade_limit: 100                 # per wallet per poll; >> any wallet's 2-min burst
  exit_poll_interval_seconds: 300       # copy-exit check on signal wallets
  resolution_poll_interval_seconds: 3600
  # set to the best ROBUST validate cell of the winning cohort from the
  # 2026-07-03 cohort sweep (reports/backtest_report.md): cohort B,
  # N=5 W=12h F=$1000 hold — best at both $50 and $100 position sizes,
  # 83% of grid neighbors profitable in validate.
  # position raised $20 -> $50 (owner instruction, overnight 2026-07-03): walks
  # deeper into the book for honest fills. Positions opened at $20 stay $20
  # (per-row position_usd in paper_trades).
  watchlist_cohort: B                   # wallet set to trade on: A / B / C / union
  # a signal detected this long after its Nth trade (e.g. from backfilled data
  # after a restart) is recorded STALE and never entered — entering at today's
  # price hours late is not a copy of the signal and pollutes paper stats
  max_signal_age_seconds: 1800
  default_n: 5
  default_window_hours: 12
  default_size_floor: 1000
  exit_strategy: hold_to_resolution     # beat copy_exits in all top validate cells
  position_size_usd: 50
  # gate clock RESTARTED by the owner 2026-07-05 09:00 EDT after the
  # global-feed undersampling fix (days 1-2 had ~5% trade coverage — invalid).
  # Day-3 review due exactly 72h later: 2026-07-08 13:00 UTC (09:00 EDT).
  gate_start_utc: "2026-07-05T13:00:00Z"
  # day-3 decision-gate thresholds agreed with the owner 2026-07-03 (PLAN.md)
  gate:
    min_fills: 15               # OPEN+CLOSED paper positions by day 3
    min_win_rate: 0.55          # over closed positions...
    min_closed_for_win_rate: 10 # ...once at least this many have closed
    max_mean_alpha_decay: 0.10  # $/share; ~50% of the backtested ~20c/share edge

live:
  max_loss_usd: 200  # kill switch threshold — not used yet

# Event tag label -> our category. First match wins, checked in this order.
# Discovered in Phase 0: Gamma market.category and market.tags are null;
# category comes from GET /events?slug=... -> tags[].label.
category_tag_map:
  POLITICS: [politics, elections, geopolitics, world elections, global elections, us-current-affairs]
  SPORTS: [sports, soccer, nba, nfl, mlb, nhl, tennis, esports, olympics]
  CRYPTO: [crypto, bitcoin, ethereum, solana, memecoins]
  FINANCE: [finance, economy, business, fed rates, stocks, macro]
  CULTURE: [culture, pop culture, celebrities, entertainment, movies, music, awards]
  TECH: [tech, science, ai, space, big tech]
